// PAGE: GOALS  (subtasks drive % progress)
// ══════════════════════════════════════════════════════════════════════════
const PageGoals = () => {
  const today = todayKey();
  const [goals,setGoals] = useState(()=>load('goals',[]));
  const [showAdd,setShowAdd] = useState(false);
  const [addSubFor,setAddSubFor] = useState(null);
  const [subForm,setSubForm] = useState({title:'',due:''});
  const [form,setForm] = useState({title:'',category:'Personal',due:'',note:''});
  const sync = g => { setGoals(g); save('goals',g); };
  const addGoal = () => { if(!form.title.trim())return; sync([...goals,{...form,id:uid(),subtasks:[]}]); setForm({title:'',category:'Personal',due:'',note:''}); setShowAdd(false); };
  const addSub = gid => { if(!subForm.title.trim())return; sync(goals.map(g=>g.id!==gid?g:{...g,subtasks:[...(g.subtasks||[]),{id:uid(),title:subForm.title,due:subForm.due,done:false}]})); setSubForm({title:'',due:''}); setAddSubFor(null); };
  const toggleSub = (gid,sid) => sync(goals.map(g=>g.id!==gid?g:{...g,subtasks:(g.subtasks||[]).map(s=>s.id===sid?{...s,done:!s.done}:s)}));
  const delSub = (gid,sid) => sync(goals.map(g=>g.id!==gid?g:{...g,subtasks:(g.subtasks||[]).filter(s=>s.id!==sid)}));
  const pct = g => { const s=g.subtasks||[]; return s.length?Math.round(s.filter(x=>x.done).length/s.length*100):0; };
  return html`
    <div class="page fade-up">
      <div class="page-header">
        <div class="col"><h2 style="font-size:20px;font-weight:700;color:#e5e2e1">Metas</h2><p style="font-size:12px;color:rgba(196,176,154,0.6)">${goals.filter(g=>pct(g)>=100).length}/${goals.length} completadas</p></div>
        <button class="btn-p" onClick=${()=>setShowAdd(true)}><${Ic} n="plus" s=${15} c="#fff"/>Nueva</button>
      </div>
      ${goals.length===0&&html`<div class="card empty-state"><div class="emo">🎯</div><p style="font-size:14px;font-weight:500;color:#e5e2e1;margin-bottom:6px">Define tu primera meta</p><p style="font-size:12px;color:rgba(196,176,154,0.4)">Agrega pasos para medir tu avance</p></div>`}
      <div style="display:flex;flex-direction:column;gap:14px">
        ${goals.map(g=>{
          const p=pct(g); const done=p>=100; const subs=g.subtasks||[]; const cc=CAT_COLORS[g.category]||'#9A7A6B';
          return html`
            <div class="card" style=${{borderLeft:`3px solid ${done?'#FF9500':cc}`}}>
              <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
                <div style="flex:1;min-width:0">
                  <div style="display:flex;align-items:center;gap:8px">${done&&html`<span>⭐</span>`}<p style="font-size:14px;font-weight:600;color:#e5e2e1">${g.title}</p></div>
                  <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
                    <span class="badge" style=${{background:cc+'22',color:cc,fontSize:10}}>${g.category}</span>
                    ${g.due&&html`<span style="font-size:11px;color:rgba(196,176,154,0.4)">📅 ${fmtDate(g.due)}</span>`}
                  </div>
                </div>
                <button onClick=${()=>sync(goals.filter(x=>x.id!==g.id))} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.2);padding:4px;flex-shrink:0"><${Ic} n="trash" s=${14}/></button>
              </div>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
                <div class="prog-track" style="flex:1"><div class="prog-fill" style=${{width:`${p}%`,background:`linear-gradient(90deg,${cc}99,${cc})`}}/></div>
                <span style=${{fontSize:18,fontWeight:700,color:done?'#FF9500':cc,minWidth:44,textAlign:'right'}}>${p}%</span>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px">
                ${subs.map(s=>html`
                  <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.05);border-radius:10px;border:0.5px solid rgba(255,255,255,0.08)">
                    <div class=${'check-box'+(s.done?' done':'')} style="width:18px;height:18px;border-radius:5px" onClick=${()=>toggleSub(g.id,s.id)}>${s.done&&html`<${Ic} n="check" s=${11} c="#fff"/>`}</div>
                    <p style=${{fontSize:12,flex:1,color:s.done?'rgba(196,176,154,0.35)':'rgba(200,240,200,0.85)',textDecoration:s.done?'line-through':'none'}}>${s.title}</p>
                    ${s.due&&html`<span style="font-size:10px;color:rgba(196,176,154,0.35)">📅 ${fmtDate(s.due)}</span>`}
                    <button onClick=${()=>delSub(g.id,s.id)} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.18)"><${Ic} n="trash" s=${12}/></button>
                  </div>
                `)}
                ${addSubFor===g.id?html`
                  <div style="display:flex;gap:6px;margin-top:4px">
                    <input value=${subForm.title} onInput=${e=>setSubForm({...subForm,title:e.target.value})} placeholder="Nuevo paso..." autoFocus style="flex:1;font-size:12px;padding:8px 10px" onKeyDown=${e=>{if(e.key==='Enter')addSub(g.id);if(e.key==='Escape')setAddSubFor(null);}}/>
                    <input type="date" value=${subForm.due} onInput=${e=>setSubForm({...subForm,due:e.target.value})} style="width:120px;font-size:11px;padding:8px 6px"/>
                    <button class="btn-p" style="padding:8px 12px;font-size:12px" onClick=${()=>addSub(g.id)}>+</button>
                  </div>
                `:html`
                  <button onClick=${()=>setAddSubFor(g.id)} style="display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:10px;border:1px dashed rgba(196,176,154,0.2);background:none;color:rgba(196,176,154,0.4);font-size:12px;cursor:pointer;width:100%;font-family:Inter,sans-serif;margin-top:2px">
                    <${Ic} n="plus" s=${12} c="rgba(196,176,154,0.4)"/> Agregar paso
                  </button>
                `}
              </div>
              ${g.note&&html`<p style="font-size:11px;color:rgba(196,176,154,0.4);margin-top:10px;padding-top:10px;border-top:0.5px solid rgba(255,255,255,0.08)">${g.note}</p>`}
            </div>
          `;
        })}
      </div>
      <${Modal} open=${showAdd} onClose=${()=>setShowAdd(false)} title="Nueva meta">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input value=${form.title} onInput=${e=>setForm({...form,title:e.target.value})} placeholder="¿Cuál es tu meta?" autoFocus/>
          <div><label class="lbl">Categoría</label><select value=${form.category} onChange=${e=>setForm({...form,category:e.target.value})}>${CATS.map(c=>html`<option>${c}</option>`)}</select></div>
          <div><label class="lbl">Fecha límite</label><input type="date" value=${form.due} onInput=${e=>setForm({...form,due:e.target.value})}/></div>
          <textarea value=${form.note} onInput=${e=>setForm({...form,note:e.target.value})} placeholder="Descripción o motivación" rows="2" style="resize:none"/>
          <p style="font-size:11px;color:rgba(196,176,154,0.4)">💡 Después podrás agregar pasos que calculan el % automáticamente.</p>
          <button class="btn-p" style="width:100%;justify-content:center" onClick=${addGoal}>Crear meta</button>
        </div>
      <//>
    </div>
  `;
};

// ══════════════════════════════════════════════════════════════════════════
// PAGE: STATS
// ══════════════════════════════════════════════════════════════════════════
const PageStats = () => {
  const today = todayKey();
  const mo    = today.slice(0,7);
  const habits = load('habits',[]);
  const tasks  = load('tasks',[]);
  const txns   = load('txns',[]);
  const logs   = load('workout-logs',[]);
  const last30 = Array.from({length:30},(_,i)=>{const d=new Date();d.setDate(d.getDate()-29+i);const k=d.toISOString().split('T')[0];const done=habits.filter(h=>(h.done||[]).includes(k)).length;return{k,pct:habits.length?done/habits.length:0,isToday:k===today};});
  const hStreaks = habits.map(h=>{let mx=0,cur=0;[...new Set(h.done||[])].sort().forEach((d,i,a)=>{if(i===0){cur=1;}else{const diff=(new Date(d)-new Date(a[i-1]))/86400000;cur=diff===1?cur+1:1;}if(cur>mx)mx=cur;});return{name:h.name,icon:h.icon,s:mx};}).sort((a,b)=>b.s-a.s).slice(0,5);
  const MNAMES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const mData=Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-5+i);const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;const inc=txns.filter(t=>t.type==='income'&&t.date.startsWith(k)).reduce((s,t)=>s+t.amount,0);const exp=txns.filter(t=>t.type==='expense'&&t.date.startsWith(k)).reduce((s,t)=>s+t.amount,0);return{l:MNAMES[d.getMonth()],inc,exp};});
  const maxV=Math.max(...mData.flatMap(m=>[m.inc,m.exp]),1);

  return html`
    <div class="page fade-up">
      <h2 style="font-size:20px;font-weight:700;color:#e5e2e1;margin-bottom:20px">Estadísticas</h2>
      <div class="grid2" style="margin-bottom:20px">
        ${[
          {l:'Hábitos activos',v:habits.length,c:'#CC7700'},
          {l:'Tareas completadas',v:`${tasks.filter(t=>t.done).length}/${tasks.length}`,c:'#CC7700'},
          {l:'Entrenos este mes',v:logs.filter(l=>l.date.startsWith(mo)&&l.done).length,c:'#9B7440'},
          {l:'Balance mes',v:fmtMoney(txns.filter(t=>t.type==='income'&&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0)-txns.filter(t=>t.type==='expense'&&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0)),c:'#8B6535'},
        ].map(s=>html`<div class="card"><p style="font-size:11px;color:rgba(196,176,154,0.6);margin-bottom:6px">${s.l}</p><p style=${{fontSize:20,fontWeight:700,color:s.c}}>${s.v}</p></div>`)}
      </div>

      <div class="card" style="margin-bottom:20px">
        <p style="font-size:12px;font-weight:500;color:rgba(196,176,154,0.6);margin-bottom:12px">Hábitos — últimos 30 días</p>
        <div style="display:flex;flex-wrap:wrap;gap:3px">
          ${last30.map((d,i)=>html`<div style=${{width:18,height:18,borderRadius:4,background:d.pct===0?'rgba(255,255,255,0.3)':`rgba(61,122,82,${0.15+d.pct*0.75})`,border:d.isToday?'1.5px solid #CC7700':'none'}} title=${`${d.k}: ${Math.round(d.pct*100)}%`}/>`)}
        </div>
        <div style="display:flex;gap:6px;align-items:center;margin-top:10px">
          <span style="font-size:10px;color:rgba(196,176,154,0.45)">Menos</span>
          ${[0.15,0.35,0.55,0.75,0.9].map(p=>html`<div style=${{width:12,height:12,borderRadius:3,background:`rgba(61,122,82,${p})`}}/>`)}
          <span style="font-size:10px;color:rgba(196,176,154,0.45)">Más</span>
        </div>
      </div>

      ${hStreaks.length>0&&html`
        <div class="card" style="margin-bottom:20px">
          <p style="font-size:12px;font-weight:500;color:rgba(196,176,154,0.6);margin-bottom:12px">Mejores rachas</p>
          ${hStreaks.map(h=>html`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><span style="font-size:18px">${h.icon}</span><span style="flex:1;font-size:12px;color:#e5e2e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.name}</span><span style="font-size:13px;font-weight:700;color:#A0E878">🔥 ${h.s}</span></div>`)}
        </div>
      `}

      <div class="card" style="margin-bottom:20px">
        <p style="font-size:12px;font-weight:500;color:rgba(196,176,154,0.6);margin-bottom:16px">Ingresos vs Gastos</p>
        <div style="display:flex;align-items:flex-end;gap:8px;height:100px">
          ${mData.map(m=>html`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div style="width:100%;display:flex;gap:2px;align-items:flex-end;height:80px">
                <div style=${{flex:1,borderRadius:'3px 3px 0 0',background:'rgba(61,122,82,0.7)',height:`${Math.max(2,(m.inc/maxV)*78)}px`,transition:'height .5s'}}/>
                <div style=${{flex:1,borderRadius:'3px 3px 0 0',background:'rgba(181,97,74,0.65)',height:`${Math.max(2,(m.exp/maxV)*78)}px`,transition:'height .5s'}}/>
              </div>
              <span style="font-size:9px;color:rgba(196,176,154,0.45)">${m.l}</span>
            </div>
          `)}
        </div>
        <div style="display:flex;gap:16px;margin-top:8px">
          <div style="display:flex;gap:6px;align-items:center"><div style="width:10px;height:10px;border-radius:2px;background:rgba(61,122,82,0.7)"/><span style="font-size:10px;color:rgba(196,176,154,0.6)">Ingresos</span></div>
          <div style="display:flex;gap:6px;align-items:center"><div style="width:10px;height:10px;border-radius:2px;background:rgba(181,97,74,0.65)"/><span style="font-size:10px;color:rgba(196,176,154,0.6)">Gastos</span></div>
        </div>
      </div>
    </div>
  `;
};

// ══════════════════════════════════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════════════════════════════════
const Settings = ({open,onClose}) => {
  const [key,setKey] = useState(()=>load('ritual-api-key',''));
  const [name,setName] = useState(()=>load('ritual-name',''));
  const saveAll = () => { save('ritual-api-key',key); save('ritual-name',name); onClose(); };
  return html`
    <${Modal} open=${open} onClose=${onClose} title="Ajustes">
      <div style="display:flex;flex-direction:column;gap:14px">
        <div><label class="lbl">Tu nombre</label><input value=${name} onInput=${e=>setName(e.target.value)} placeholder="¿Cómo te llamas?"/></div>
        <div>
          <label class="lbl" style="display:flex;align-items:center;gap:6px"><${Ic} n="key" s=${13} c="#CC7700"/> Anthropic API Key (IA de comidas)</label>
          <input type="password" value=${key} onInput=${e=>setKey(e.target.value)} placeholder="sk-ant-..."/>
          <p style="font-size:11px;color:rgba(196,176,154,0.45);margin-top:6px">Se guarda solo en tu dispositivo. Necesaria para generar planes con IA.</p>
        </div>
        <button class="btn-p" style="width:100%;justify-content:center" onClick=${saveAll}>Guardar ajustes</button>
      </div>
    <//>
  `;
};

// ══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════
const App = () => {
  const [tab,setTab] = useState('home');
  const [showSet,setShowSet] = useState(false);
  const [showMore,setShowMore] = useState(false);

  const pages = {home:PageHome,habits:PageHabits,tasks:PageTasks,food:PageFood,gym:PageGym,finance:PageFinance,goals:PageGoals,stats:PageStats};
  const Page  = pages[tab]||PageHome;

  return html`
    <div style="min-height:100vh">
      <!-- SIDEBAR desktop -->
      <nav class="sidebar">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:28px;padding:0 6px">
          <div style="width:32px;height:32px;border-radius:10px;background:rgba(255,149,0,0.18);border:1px solid rgba(255,184,77,0.25);display:flex;align-items:center;justify-content:center;box-shadow:0 0 12px rgba(255,149,0,0.15)"><span style="font-size:16px">✦</span></div>
          <span style="font-size:17px;font-weight:700;color:#ffb84d;letter-spacing:-0.3px">ritual.</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex:1">
          ${TABS.map(t=>html`
            <button class=${'nav-item'+(tab===t.id?' active':'')} onClick=${()=>setTab(t.id)}>
              <${Ic} n=${t.icon} s=${16} c=${tab===t.id?'#ffb84d':'rgba(196,176,154,0.45)'}/>
              ${t.label}
            </button>
          `)}
        </div>
        <button class="nav-item" style="margin-top:8px" onClick=${()=>setShowSet(true)}>
          <${Ic} n="settings" s=${16} c="rgba(196,176,154,0.4)"/>Ajustes
        </button>
      </nav>

      <!-- MAIN -->
      <main class="main-content" style="min-height:100vh;max-width:640px;padding-bottom:40px;-webkit-overflow-scrolling:touch">
        <${Page} setTab=${setTab}/>
      </main>

      <!-- BOTTOM NAV mobile -->
      <nav class="bottom-nav">
        ${BNAV.map(id=>{const t=TABS.find(x=>x.id===id);return html`
          <button class=${'bnav-item'+(tab===id?' active':'')} onClick=${()=>{setTab(id);setShowMore(false);}}>
            <${Ic} n=${t.icon} s=${20} c=${tab===id?'#ffb84d':'rgba(196,176,154,0.4)'}/>
            <span>${t.label}</span>
          </button>
        `;})}
        <button class=${'bnav-item'+(SEC.includes(tab)||showMore?' active':'')} onClick=${()=>setShowMore(!showMore)}>
          <${Ic} n="more" s=${20} c=${SEC.includes(tab)||showMore?'#ffb84d':'rgba(196,176,154,0.4)'}/>
          <span>Más</span>
        </button>
      </nav>

      <!-- MORE MENU mobile -->
      ${showMore&&html`
        <div style="position:fixed;bottom:80px;right:12px;z-index:40">
          <div class="glass" style="border-radius:16px;padding:8px;display:flex;flex-direction:column;gap:4px;min-width:160px;box-shadow:0 8px 32px rgba(90,70,45,0.2)">
            ${[...TABS.filter(t=>SEC.includes(t.id)),{id:'settings',label:'Ajustes',icon:'settings'}].map(t=>html`
              <button class=${'nav-item'+(tab===t.id?' active':'')} onClick=${()=>{if(t.id==='settings')setShowSet(true);else setTab(t.id);setShowMore(false);}}>
                <${Ic} n=${t.icon} s=${15} c=${tab===t.id?'#ffb84d':'rgba(196,176,154,0.45)'}/>
                ${t.label}
              </button>
            `)}
          </div>
        </div>
      `}

      <${Settings} open=${showSet} onClose=${()=>setShowSet(false)}/>
    </div>
  `;
};

render(html`<${App}/>`, document.getElementById('root'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ritual.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── LUMEN design system tokens (from Google Stitch) ── */
    :root{
      --obsidian:   #050505;
      --surface:    #131313;
      --surf-mid:   #1c1b1b;
      --surf-hi:    #2a2a2a;
      --amber:      #FF9500;
      --amber-soft: #ffb84d;
      --amber-pale: #ffd49a;
      --on-surface: #e5e2e1;
      --on-muted:   #c4b09a;
      --glass-border: rgba(255,184,77,0.18);
      --glass-bg:     rgba(20,20,20,0.42);
      --glass-blur:   blur(28px) saturate(180%) brightness(1.08);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;overflow-x:hidden;min-height:100vh;color:var(--on-surface);}

    /* ══ BACKGROUND ══════════════════════════════════════════════════════════ */
    .bg-scene{
      position:fixed;inset:0;z-index:0;overflow:hidden;
      background:var(--obsidian);
    }
    .bg-photo{
      position:absolute;inset:0;
      background-image:url(bg.avif);
      background-size:cover;
      background-position:center 30%;
      background-repeat:no-repeat;
      filter:brightness(0.15) saturate(0.5);
    }
    .bg-photo::after{
      content:'';position:absolute;inset:0;
      background:rgba(4,4,4,0.45);
    }
    /* Amber bokeh orbs — LUMEN signature (large, prominent) */
    .bg-css{position:absolute;inset:0;pointer-events:none;}
    .bg-css-base{position:absolute;inset:0;background:
      radial-gradient(ellipse 40% 55% at 72% 14%, rgba(255,149,0,0.70) 0%, rgba(200,90,0,0.32) 28%, transparent 60%),
      radial-gradient(ellipse 28% 42% at 88% 36%, rgba(255,184,77,0.52) 0%, rgba(180,80,0,0.22) 33%, transparent 58%),
      radial-gradient(ellipse 22% 30% at 62% 52%, rgba(255,120,0,0.18) 0%, transparent 52%),
      radial-gradient(ellipse 50% 65% at 76% 22%, rgba(30,14,0,0.75) 18%, transparent 68%);
    }
    /* Keep leaf/vein classes to avoid HTML errors but hide */
    .css-leaf,.light-patch,.vein{display:none;}
    .cl-1,.cl-2,.cl-3,.lp-1,.lp-2,.lp-3,.vn-1,.vn-2{display:none;}

    /* ══ LUMEN LIQUID GLASS SYSTEM ══════════════════════════════════════════ */
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;width:220px;z-index:30;
      background:rgba(8,8,8,0.72);
      backdrop-filter:blur(60px) saturate(160%) brightness(1.05);
      -webkit-backdrop-filter:blur(60px) saturate(160%) brightness(1.05);
      border-right:1px solid rgba(255,184,77,0.1);
      display:flex;flex-direction:column;padding:24px 12px;
    }
    /* LUMEN glass card — semi-transparent, bokeh bleeds through */
    .card{
      background:rgba(12,10,8,0.58);
      backdrop-filter:blur(22px) saturate(130%);
      -webkit-backdrop-filter:blur(22px) saturate(130%);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:14px;padding:18px;
      box-shadow:0 4px 28px rgba(0,0,0,0.38);
      transition:border-color .2s ease;
    }
    .card:hover{border-color:rgba(255,184,77,0.14);}
    .glass{
      background:rgba(10,8,6,0.52);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.06);
    }
    .glass-hover:active{background:rgba(255,149,0,0.08);transition:all .12s ease;}
    .nav-item{
      display:flex;align-items:center;gap:10px;padding:9px 12px;
      border-radius:10px;font-size:13px;font-weight:500;
      color:rgba(196,176,154,0.6);cursor:pointer;transition:all .15s ease;
      border:0.5px solid transparent;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;
    }
    .nav-item:hover{background:rgba(255,149,0,0.08);color:var(--amber-pale);}
    .nav-item.active{
      background:rgba(255,149,0,0.09);
      color:var(--amber-soft);
      border:1.5px dashed rgba(255,184,77,0.42);
    }
    /* Bottom nav */
    .bottom-nav{
      display:none;position:fixed;bottom:0;left:0;right:0;z-index:30;
      padding:10px 6px env(safe-area-inset-bottom,16px);
      background:rgba(5,5,5,0.82);
      backdrop-filter:blur(60px) saturate(180%) brightness(1.05);
      -webkit-backdrop-filter:blur(60px) saturate(180%) brightness(1.05);
      border-top:1px solid rgba(255,184,77,0.1);
    }
    .bnav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
      padding:6px 2px;border-radius:12px;font-size:9.5px;font-weight:500;
      color:rgba(196,176,154,0.35);cursor:pointer;transition:all .18s ease;
      border:none;background:none;font-family:'Inter',sans-serif;letter-spacing:0.01em;
    }
    .bnav-item.active{color:var(--amber-soft);}
    .bnav-item.active svg{filter:drop-shadow(0 0 5px rgba(255,149,0,0.6));}

    @media(min-width:768px){.main-content{margin-left:220px;}.bottom-nav{display:none!important;}.sidebar{display:flex;}}
    @media(max-width:767px){
      .sidebar{display:none;}
      .bottom-nav{display:flex;}
      .main-content{margin-left:0;padding-bottom:96px;}
      .page{padding:18px 14px 0;}
      .card{padding:14px;border-radius:18px;}
      input,textarea,select{font-size:16px;}
      .btn-p,.btn-g{min-height:44px;}
      .modal-bg{padding:12px 10px;}
      .modal-box{max-height:calc(100vh - 100px);}
      .modal-body{padding:14px 14px 20px;}
      .modal-header-sticky{padding:16px 14px 12px;}
    }

    /* Inputs — LUMEN style */
    input,textarea,select{
      background:rgba(14,14,14,0.6);
      border:1px solid rgba(255,184,77,0.15);
      color:var(--on-surface);border-radius:10px;padding:11px 14px;width:100%;outline:none;
      font-family:'Inter',sans-serif;font-size:13px;transition:all .2s;
    }
    input:focus,textarea:focus,select:focus{
      border-color:rgba(255,149,0,0.5);
      background:rgba(20,20,20,0.7);
      box-shadow:0 0 0 3px rgba(255,149,0,0.1), 0 0 12px rgba(255,149,0,0.08);
    }
    input::placeholder,textarea::placeholder{color:rgba(196,176,154,0.3);}
    select option{background:#131313;color:var(--on-surface);}

    /* Buttons — LUMEN amber */
    .btn-p{
      background:rgba(255,149,0,0.85);color:#1a0a00;
      border:1px solid rgba(255,184,77,0.5);
      border-radius:12px;padding:10px 18px;font-size:13px;font-weight:700;
      cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px;
      font-family:'Inter',sans-serif;
      box-shadow:0 0 16px rgba(255,149,0,0.25),inset 0 1px 0 rgba(255,255,255,0.25);
    }
    .btn-p:hover{background:rgba(255,149,0,1);box-shadow:0 0 28px rgba(255,149,0,0.45),inset 0 1px 0 rgba(255,255,255,0.3);transform:translateY(-1px);}
    .btn-p:active{transform:translateY(0);box-shadow:0 0 12px rgba(255,149,0,0.3);}
    .btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none;}
    .btn-g{
      background:rgba(255,149,0,0.1);color:var(--amber-pale);
      border:1px solid rgba(255,184,77,0.2);border-radius:12px;
      padding:10px 18px;font-size:13px;font-weight:500;
      cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;
      display:inline-flex;align-items:center;gap:7px;
    }
    .btn-g:hover{background:rgba(255,149,0,0.18);border-color:rgba(255,184,77,0.35);color:#fff;}
    .btn-d{
      background:rgba(255,69,58,0.12);color:#FF9F9A;
      border:1px solid rgba(255,69,58,0.22);
      border-radius:10px;padding:10px 14px;font-size:13px;font-weight:500;
      cursor:pointer;font-family:'Inter',sans-serif;
      transition:all .2s;
    }
    .btn-d:hover{background:rgba(255,69,58,0.2);box-shadow:0 0 12px rgba(255,69,58,0.2);}
    /* Checkbox — amber glow when done */
    .check-box{
      width:22px;height:22px;border-radius:50%;
      border:1.5px solid rgba(255,184,77,0.3);background:rgba(14,14,14,0.5);
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      transition:all .2s;flex-shrink:0;
    }
    .check-box.done{
      background:rgba(255,149,0,0.85);border-color:var(--amber);
      box-shadow:0 0 12px rgba(255,149,0,0.45),inset 0 1px 0 rgba(255,255,255,0.25);
    }
    /* Progress — amber gradient */
    .prog-track{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
    .prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--amber) 0%,var(--amber-pale) 100%);transition:width .5s ease;box-shadow:0 0 6px rgba(255,149,0,0.4);}
    /* Modal — LUMEN frosted overlay */
    .modal-bg{
      position:fixed;inset:0;z-index:50;
      display:flex;align-items:center;justify-content:center;
      padding:20px 16px;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(24px) saturate(140%);
      -webkit-backdrop-filter:blur(24px) saturate(140%);
    }
    .modal-box{
      background:rgba(10,10,10,0.88);
      backdrop-filter:blur(60px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter:blur(60px) saturate(180%) brightness(1.08);
      border:1px solid rgba(255,184,77,0.16);
      border-top:1px solid rgba(255,184,77,0.3);
      box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,184,77,0.1);
      border-radius:22px;
      width:100%;max-width:460px;
      display:flex;flex-direction:column;
      max-height:calc(100vh - 40px);
      overflow:hidden;
    }
    .modal-header-sticky{
      flex-shrink:0;
      padding:18px 20px 14px;
      border-bottom:1px solid rgba(255,184,77,0.08);
    }
    .modal-body{
      flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
      padding:16px 20px 20px;
    }
    .modal-handle{display:none;}
    @media(max-width:767px){
      .modal-bg{padding:12px 10px;}
      .modal-box{border-radius:22px;max-height:calc(100vh - 100px);}
      .modal-body{padding:14px 14px 20px;}
      .modal-header-sticky{padding:16px 14px 12px;}
    }
    /* Badges — LUMEN amber tones */
    .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
    .badge-g{background:rgba(255,149,0,0.15);color:var(--amber-soft);border:1px solid rgba(255,149,0,0.2);}
    .badge-s{background:rgba(255,184,77,0.12);color:var(--amber-pale);border:1px solid rgba(255,184,77,0.18);}
    .badge-r{background:rgba(255,69,58,0.15);color:#FF9F9A;border:1px solid rgba(255,69,58,0.2);}
    /* Tabs */
    .tab-pill{
      padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;
      border:1px solid rgba(255,184,77,0.12);background:rgba(14,14,14,0.5);
      color:rgba(196,176,154,0.5);transition:all .15s;font-family:'Inter',sans-serif;
    }
    .tab-pill.active{background:rgba(255,149,0,0.18);color:var(--amber-soft);border-color:rgba(255,149,0,0.35);box-shadow:0 0 10px rgba(255,149,0,0.12);}
    /* Mood */
    .mood-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;
      border-radius:12px;border:1px solid rgba(255,184,77,0.1);cursor:pointer;
      transition:all .2s;background:rgba(14,14,14,0.4);font-family:'Inter',sans-serif;
    }
    .mood-btn.sel{background:rgba(255,149,0,0.15);border-color:rgba(255,149,0,0.3);box-shadow:0 0 14px rgba(255,149,0,0.1);}
    /* Scrollbar */
    ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(255,184,77,0.2);border-radius:2px;}
    /* Animations */
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp .28s cubic-bezier(.4,0,.2,1) forwards;}
    @keyframes spin-anim{to{transform:rotate(360deg)}}
    .spin{animation:spin-anim 1s linear infinite;display:inline-block;}
    /* Layout */
    .page{padding:28px 24px 0;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .row{display:flex;align-items:center;gap:8px;}
    .col{display:flex;flex-direction:column;gap:4px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    label.lbl{font-size:11px;color:rgba(196,176,154,0.5);display:block;margin-bottom:5px;}
    .empty-state{text-align:center;padding:48px 20px;}
    .empty-state .emo{font-size:44px;margin-bottom:12px;}
    .streak{color:var(--amber-soft);font-size:11px;}
    .info-box{background:rgba(255,149,0,0.06);border:1px solid rgba(255,149,0,0.15);border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
    /* Sidebar logo */
    .sidebar-logo{font-size:20px;font-weight:700;color:var(--amber-soft);letter-spacing:-0.5px;padding:4px 12px 20px;}
  </style>
</head>
<body>
<div class="bg-scene">
  <div class="bg-photo"></div>
  <div class="bg-css"><div class="bg-css-base"></div></div>
</div>
<div id="root" style="position:relative;z-index:1;min-height:100vh;"></div>

<script type="module">
import { h, render } from 'https://esm.sh/preact@10.23.1';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.23.1/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

// ── UTILS ──────────────────────────────────────────────────────────────────
const todayKey = () => new Date().toISOString().split('T')[0];
const load = (k,fb) => { try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;} };
const save = (k,v) => localStorage.setItem(k,JSON.stringify(v));
const uid  = () => Date.now()+Math.random().toString(36).slice(2,6);
const fmtDate = d => new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'});
const fmtMoney = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0}).format(n||0);
const CAT_COLORS = {Trabajo:'#6B9C7A',Personal:'#CC7700',Salud:'#9B7440',Aprendizaje:'#8B6535',Hogar:'#B58A4A',Otro:'#9A7A6B'};
const CATS = Object.keys(CAT_COLORS);
const MOODS = [{e:'😴',n:'Cansado',v:1},{e:'😐',n:'Normal',v:2},{e:'🙂',n:'Bien',v:3},{e:'😊',n:'Genial',v:4},{e:'🔥',n:'Imparable',v:5}];

// ── ICONS (SVG innerHTML strings) ─────────────────────────────────────────
const ICON = {
  home: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  habit:'<path d="M9 12l2 2 4-4"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>',
  task: '<line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>',
  food: '<path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/>',
  gym:  '<path d="M6 4v16M10 4v16M6 12h4M14 4v16M18 4v16M14 12h4"/>',
  finance:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',
  goal: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  stats:'<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',
  plus: '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  trash:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/>',
  x:    '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  spark:'<path d="M12 3l1.09 3.26L17 7l-2.5 2.43.59 3.51L12 11.25 9.91 12.94l.59-3.51L8 7l3.91-.74z"/><path d="M5 3v4M3 5h4M19 17v4M17 19h4"/>',
  info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
  up:   '<line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>',
  down: '<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>',
  key:  '<path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>',
  more: '<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>',
};
const Ic = ({n,s=18,c='currentColor',sw=1.8}) => html`
  <svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke=${c} stroke-width=${sw} stroke-linecap="round" stroke-linejoin="round" dangerouslySetInnerHTML=${{__html:ICON[n]||''}}/>
`;

// ── MODAL ──────────────────────────────────────────────────────────────────
const Modal = ({open,onClose,title,children}) => {
  if(!open) return null;
  return html`
    <div class="modal-bg" onClick=${onClose}>
      <div class="modal-box fade-up" onClick=${e=>e.stopPropagation()}>
        <div class="modal-handle"/>
        <div class="modal-header-sticky">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <h3 style="font-size:16px;font-weight:600;color:#e5e2e1">${title}</h3>
            <button onClick=${onClose} style="background:rgba(255,255,255,0.1);border:0.5px solid rgba(255,255,255,0.15);border-radius:50%;cursor:pointer;color:rgba(196,176,154,0.7);padding:0;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <${Ic} n="x" s=${15}/>
            </button>
          </div>
        </div>
        <div class="modal-body">${children}</div>
      </div>
    </div>
  `;
};

// ── AI HELPER ─────────────────────────────────────────────────────────────
const askAI = async (prompt, apiKey) => {
  if(!apiKey) throw new Error('Sin API key. Configúrala en Ajustes.');
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','content-type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,messages:[{role:'user',content:prompt}]})
  });
  if(!res.ok) throw new Error(`Error ${res.status}`);
  const d = await res.json();
  return d.content[0].text;
};

// ── NAV ────────────────────────────────────────────────────────────────────
const TABS = [
  {id:'home',   label:'Inicio',   icon:'home'},
  {id:'habits', label:'Hábitos',  icon:'habit'},
  {id:'tasks',  label:'Tareas',   icon:'task'},
  {id:'finance',label:'Finanzas', icon:'finance'},
  {id:'goals',  label:'Metas',    icon:'goal'},
  {id:'food',   label:'Comidas',  icon:'food'},
  {id:'gym',    label:'Gym',      icon:'gym'},
  {id:'stats',  label:'Stats',    icon:'stats'},
];
const BNAV = ['home','habits','tasks','finance','goals'];
const SEC  = ['food','gym','stats'];

// ══════════════════════════════════════════════════════════════════════════
// PAGE: HOME
// ══════════════════════════════════════════════════════════════════════════
const PageHome = ({setTab}) => {
  const today = todayKey();
  const habits = load('habits',[]);
  const tasks  = load('tasks',[]);
  const txns   = load('txns',[]);
  const meals  = load('meals',{});
  const logs   = load('workout-logs',[]);
  const [mood,setMoodS] = useState(()=>load(`mood-${today}`,null));
  const setMood = v => { setMoodS(v); save(`mood-${today}`,v); };

  const doneH  = habits.filter(h=>(h.done||[]).includes(today)).length;
  const doneT  = tasks.filter(t=>t.done&&t.due===today).length;
  const totT   = tasks.filter(t=>t.due===today).length;
  const mealN  = (meals[today]||[]).length;
  const wod    = logs.find(l=>l.date===today);
  const mo     = today.slice(0,7);
  const inc    = txns.filter(t=>t.type==='income'&&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0);
  const exp    = txns.filter(t=>t.type==='expense'&&t.date.startsWith(mo)).reduce((s,t)=>s+t.amount,0);
  const name   = load('ritual-name','');
  const greet  = () => { const h=new Date().getHours(); return h<12?'Buenos días':h<18?'Buenas tardes':'Buenas noches'; };

  const widgets = [
    {l:'Hábitos hoy', v:`${doneH}/${habits.length}`, pct:habits.length?doneH/habits.length:0, c:'#CC7700', t:'habits', i:'habit'},
    {l:'Tareas hoy',  v:`${doneT}/${totT}`,  pct:totT?doneT/totT:0,  c:'#CC7700', t:'tasks',  i:'task'},
    {l:'Comidas reg.',v:`${mealN}/3`,         pct:mealN/3,             c:'#9B7440', t:'food',   i:'food'},
    {l:'Balance mes', v:fmtMoney(inc-exp),    pct:0,                   c:'#8B6535', t:'finance',i:'finance'},
  ];

  return html`
    <div class="page fade-up">
      <div class="card" style="margin-bottom:20px">
        <p style="font-size:12px;color:rgba(196,176,154,0.6);margin-bottom:4px">${new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}</p>
        <h1 style="font-size:22px;font-weight:700;color:#e5e2e1;margin-bottom:4px">${greet()}${name?`, ${name}`:''} 👋</h1>
        <p style="font-size:13px;color:rgba(196,176,154,0.6)">¿Cómo está tu día?</p>
      </div>

      <div class="card" style="margin-bottom:20px">
        <p style="font-size:12px;font-weight:500;color:rgba(196,176,154,0.65);margin-bottom:10px">Estado de ánimo</p>
        <div style="display:flex;gap:8px">
          ${MOODS.map(m=>html`
            <button class=${'mood-btn'+(mood===m.v?' sel':'')} onClick=${()=>setMood(m.v)}>
              <span style="font-size:22px">${m.e}</span>
              <span style="font-size:10px;color:rgba(180,220,180,0.6);font-weight:500">${m.n}</span>
            </button>
          `)}
        </div>
      </div>

      <div class="grid2" style="margin-bottom:20px">
        ${widgets.map(w=>html`
          <div class="card glass-hover" style="cursor:pointer" onClick=${()=>setTab(w.t)}>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
              <span style="font-size:11px;color:rgba(196,176,154,0.6);font-weight:500">${w.l}</span>
              <${Ic} n=${w.i} s=${14} c=${w.c}/>
            </div>
            <p style="font-size:20px;font-weight:700;color:#e5e2e1;margin-bottom:8px">${w.v}</p>
            ${w.pct>0&&html`<div class="prog-track"><div class="prog-fill" style=${{width:`${Math.round(w.pct*100)}%`,background:`linear-gradient(90deg,${w.c}99,${w.c})`}}/></div>`}
          </div>
        `)}
      </div>

      ${wod&&html`
        <div class="card" style="margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <${Ic} n="gym" s=${16} c="#CC7700"/>
          <p style="font-size:13px;font-weight:600;color:#e5e2e1;flex:1">Gym hoy: ${wod.name}</p>
          ${wod.done&&html`<span class="badge badge-g">✓ Listo</span>`}
        </div>
      `}

      <div class="grid2">
        ${[{t:'goals',l:'Mis metas',i:'goal'},{t:'stats',l:'Estadísticas',i:'stats'},{t:'gym',l:'Ver rutina',i:'gym'},{t:'finance',l:'Finanzas',i:'finance'}].map(a=>html`
          <button class="btn-g" style="justify-content:center;gap:8px;width:100%" onClick=${()=>setTab(a.t)}>
            <${Ic} n=${a.i} s=${14} c="rgba(210,240,210,0.85)"/>${a.l}
          </button>
        `)}
      </div>
    </div>
  `;
};

// ══════════════════════════════════════════════════════════════════════════
// PAGE: HABITS  (categories, frequency, schedule, presets, edit)
// ══════════════════════════════════════════════════════════════════════════
const HABIT_CATS = ['Salud','Conocimiento','Productividad','Mental','Fitness','Social','Finanzas','Creatividad'];
const CAT_CLR  = {Salud:'#4CAF50',Conocimiento:'#2196F3',Productividad:'#FF9800',Mental:'#9C27B0',Fitness:'#F44336',Social:'#00BCD4',Finanzas:'#8BC34A',Creatividad:'#E91E63'};
const FREQ_DAYS  = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const PRESET_HABITS = [
  {name:'Beber 2L de agua',icon:'💧',category:'Salud',freq:'daily'},
  {name:'Meditar 10 min',icon:'🧘',category:'Mental',freq:'daily'},
  {name:'Leer 30 min',icon:'📚',category:'Conocimiento',freq:'daily'},
  {name:'Ejercicio 30 min',icon:'💪',category:'Fitness',freq:'daily'},
  {name:'Dormir 8h',icon:'🛏️',category:'Salud',freq:'daily'},
  {name:'Journaling',icon:'✍️',category:'Mental',freq:'daily'},
  {name:'Vitaminas',icon:'💊',category:'Salud',freq:'daily'},
  {name:'Sin redes 1h',icon:'📵',category:'Mental',freq:'daily'},
  {name:'Llamar a familia',icon:'📞',category:'Social',freq:'custom',days:['Dom']},
  {name:'Revisar finanzas',icon:'💰',category:'Finanzas',freq:'custom',days:['Lun']},
  {name:'Curso online',icon:'💻',category:'Conocimiento',freq:'custom',days:['Lun','Mié','Vie']},
  {name:'Limpieza hogar',icon:'🧹',category:'Productividad',freq:'custom',days:['Sáb']},
];
const BLANK_HABIT = {name:'',icon:'✦',category:'Salud',freq:'daily',days:[],time:''};
const PageHabits = () => {
  const today = todayKey();
  const todayDayName = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'][new Date().getDay()];
  const [habits,setHabits] = useState(()=>load('habits',[]));
  const [showAdd,setShowAdd] = useState(false);
  const [showPresets,setShowPresets] = useState(false);
  const [editHabit,setEditHabit] = useState(null);
  const [filterCat,setFilterCat] = useState('Todas');
  const [form,setForm] = useState(BLANK_HABIT);
  const sync = h => { setHabits(h); save('habits',h); };
  const isDueToday = h => h.freq==='daily' || (h.days||[]).includes(todayDayName);
  const toggle = id => sync(habits.map(h=>{if(h.id!==id)return h;const done=h.done||[];return{...h,done:done.includes(today)?done.filter(d=>d!==today):[...done,today]};}));
  const remove = id => sync(habits.filter(h=>h.id!==id));
  const add = () => {
    if(!form.name.trim())return;
    const newH={...form,id:uid(),done:[]};
    if(form.time){const tasks=load('tasks',[]);save('tasks',[...tasks,{id:uid(),title:form.icon+' '+form.name,category:'Personal',priority:'media',due:today,note:'Hábito '+form.time,done:false}]);}
    sync([...habits,newH]);setForm(BLANK_HABIT);setShowAdd(false);
  };
  const openEdit = h => { setEditHabit(h); setForm({name:h.name,icon:h.icon,category:h.category,freq:h.freq,days:h.days||[],time:h.time||''}); };
  const saveEdit = () => {
    if(!form.name.trim())return;
    sync(habits.map(h=>h.id===editHabit.id?{...h,...form}:h));
    setEditHabit(null);setForm(BLANK_HABIT);
  };
  const addPreset = p => {if(!habits.find(h=>h.name===p.name))sync([...habits,{...p,id:uid(),done:[]}]);};
  const streak = h => {let s=0;const d=new Date();while(true){const k=d.toISOString().split('T')[0];if(!(h.done||[]).includes(k))break;s++;d.setDate(d.getDate()-1);}return s;};
  const toggleDay = d => setForm(f=>({...f,days:f.days.includes(d)?f.days.filter(x=>x!==d):[...f.days,d]}));
  const dueToday=habits.filter(isDueToday);
  const done=dueToday.filter(h=>(h.done||[]).includes(today)).length;
  const pct=dueToday.length?Math.round(done/dueToday.length*100):0;
  const filtered=habits.filter(h=>filterCat==='Todas'||h.category===filterCat);
  const byCat={};filtered.forEach(h=>{if(!byCat[h.category])byCat[h.category]=[];byCat[h.category].push(h);});
  const ICONS=['✦','💧','📚','🏃','🧘','🍎','💊','✍️','🌞','🎯','💪','🎵','🛏️','🧹','💻','📵','📞','💰','🎨','🧠'];
  const HabitForm = () => html`
    <div style="display:flex;flex-direction:column;gap:12px">
      <input value=${form.name} onInput=${e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Nombre del hábito" autoFocus/>
      <div><label class="lbl">Ícono</label><div style="display:flex;flex-wrap:wrap;gap:6px">${ICONS.map(ic=>html`<button onClick=${()=>setForm(f=>({...f,icon:ic}))} style=${{width:34,height:34,borderRadius:8,border:`1.5px solid ${form.icon===ic?'#FF9500':'rgba(255,255,255,0.15)'}`,background:form.icon===ic?'rgba(255,149,0,0.15)':'rgba(255,255,255,0.06)',cursor:'pointer',fontSize:17}}>${ic}</button>`)}</div></div>
      <div><label class="lbl">Categoría</label><select value=${form.category} onChange=${e=>setForm(f=>({...f,category:e.target.value}))}>${HABIT_CATS.map(c=>html`<option>${c}</option>`)}</select></div>
      <div><label class="lbl">Frecuencia</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${[['daily','Diario'],['custom','Días específicos']].map(([v,l])=>html`
            <button onClick=${()=>setForm(f=>({...f,freq:v,days:v==='daily'?[]:f.days}))} style=${{padding:'8px 4px',borderRadius:10,border:`1px solid ${form.freq===v?'#FF9500':'rgba(255,255,255,0.13)'}`,background:form.freq===v?'rgba(255,149,0,0.15)':'rgba(255,255,255,0.05)',color:form.freq===v?'#ffb84d':'rgba(196,176,154,0.6)',fontSize:12,fontWeight:500,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>${l}</button>
          `)}
        </div>
      </div>
      ${form.freq==='custom'&&html`
        <div><label class="lbl">Días</label><div style="display:flex;gap:5px;flex-wrap:wrap">
          ${FREQ_DAYS.map(d=>html`<button onClick=${()=>toggleDay(d)} style=${{padding:'6px 10px',borderRadius:8,border:`1px solid ${form.days.includes(d)?'#FF9500':'rgba(255,255,255,0.12)'}`,background:form.days.includes(d)?'rgba(255,149,0,0.15)':'rgba(255,255,255,0.05)',color:form.days.includes(d)?'#ffb84d':'rgba(196,176,154,0.5)',fontSize:11,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>${d}</button>`)}
        </div></div>
      `}
      <div><label class="lbl">Horario (opcional — se agrega a tareas)</label><input type="time" value=${form.time} onInput=${e=>setForm(f=>({...f,time:e.target.value}))} style="color:#e5e2e1"/></div>
    </div>
  `;
  return html`
    <div class="page fade-up">
      <div class="page-header">
        <div class="col"><h2 style="font-size:20px;font-weight:700;color:#e5e2e1">Hábitos</h2><p style="font-size:12px;color:rgba(196,176,154,0.6)">${done}/${dueToday.length} hoy · ${pct}%</p></div>
        <div style="display:flex;gap:8px">
          <button class="btn-g" style="padding:10px 12px" onClick=${()=>setShowPresets(true)}><${Ic} n="spark" s=${15} c="rgba(196,176,154,0.7)"/></button>
          <button class="btn-p" onClick=${()=>{setForm(BLANK_HABIT);setShowAdd(true);}}><${Ic} n="plus" s=${15} c="#fff"/>Nuevo</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-size:12px;color:rgba(196,176,154,0.6)">Progreso hoy</span><span style="font-size:20px;font-weight:700;color:#ffb84d">${pct}%</span></div>
        <div class="prog-track"><div class="prog-fill" style=${{width:`${pct}%`}}/></div>
      </div>
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none;-webkit-overflow-scrolling:touch">
        ${['Todas',...HABIT_CATS].map(c=>html`<button class=${'tab-pill'+(filterCat===c?' active':'')} onClick=${()=>setFilterCat(c)} style="white-space:nowrap;flex-shrink:0">${c}</button>`)}
      </div>
      ${Object.entries(byCat).map(([cat,hs])=>html`
        <div style="margin-bottom:20px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style=${{width:8,height:8,borderRadius:'50%',background:CAT_CLR[cat]||'#fff',flexShrink:0}}/>
            <span style="font-size:11px;font-weight:600;color:rgba(196,176,154,0.6);text-transform:uppercase;letter-spacing:0.8px">${cat}</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${hs.map(h=>{const isDone=(h.done||[]).includes(today);const due=isDueToday(h);const s=streak(h);return html`
              <div class="card" style=${{display:'flex',alignItems:'center',gap:12,opacity:!due?0.45:isDone?0.7:1}}>
                <div class=${'check-box'+(isDone?' done':'')} onClick=${()=>due&&toggle(h.id)}>${isDone&&html`<${Ic} n="check" s=${13} c="#fff"/>`}</div>
                <span style="font-size:18px">${h.icon}</span>
                <div style="flex:1;min-width:0">
                  <p style=${{fontSize:'13px',fontWeight:500,color:isDone?'rgba(196,176,154,0.4)':'#E8F5E8',textDecoration:isDone?'line-through':'none'}}>${h.name}</p>
                  <div style="display:flex;gap:8px;align-items:center;margin-top:3px;flex-wrap:wrap">
                    <span style="font-size:10px;color:rgba(196,176,154,0.4)">${h.freq==='daily'?'Diario':(h.days||[]).join('·')}</span>
                    ${h.time&&html`<span style="font-size:10px;color:rgba(196,176,154,0.4)">⏰ ${h.time}</span>`}
                    ${s>0&&html`<span class="streak">🔥 ${s}</span>`}
                    ${!due&&html`<span style="font-size:10px;color:rgba(196,176,154,0.3)">No toca hoy</span>`}
                  </div>
                </div>
                <button onClick=${()=>openEdit(h)} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.35);padding:6px"><${Ic} n="settings" s=${14}/></button>
                <button onClick=${()=>remove(h.id)} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.2);padding:6px"><${Ic} n="trash" s=${14}/></button>
              </div>
            `;})}
          </div>
        </div>
      `)}
      ${habits.length===0&&html`<div class="card empty-state"><div class="emo">✦</div><p style="color:rgba(196,176,154,0.4);font-size:13px">Crea un hábito o elige de los predefinidos ✨</p></div>`}
      <${Modal} open=${showAdd} onClose=${()=>setShowAdd(false)} title="Nuevo hábito">
        <${HabitForm}/>
        <button class="btn-p" style="width:100%;justify-content:center;margin-top:14px" onClick=${add}>Crear hábito</button>
      <//>
      <${Modal} open=${!!editHabit} onClose=${()=>setEditHabit(null)} title="Editar hábito">
        <${HabitForm}/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
          <button class="btn-d" style="justify-content:center" onClick=${()=>{remove(editHabit.id);setEditHabit(null);}}>Eliminar</button>
          <button class="btn-p" style="justify-content:center" onClick=${saveEdit}>Guardar</button>
        </div>
      <//>
      <${Modal} open=${showPresets} onClose=${()=>setShowPresets(false)} title="Hábitos recomendados">
        <div style="display:flex;flex-direction:column;gap:8px">
          ${PRESET_HABITS.map(p=>{const already=habits.find(h=>h.name===p.name);return html`
            <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 14px">
              <span style="font-size:18px">${p.icon}</span>
              <div style="flex:1"><p style="font-size:13px;font-weight:500;color:#e5e2e1">${p.name}</p><p style="font-size:11px;color:rgba(196,176,154,0.4);margin-top:2px">${p.category} · ${p.freq==='daily'?'Diario':(p.days||[]).join(', ')}</p></div>
              <button onClick=${()=>addPreset(p)} disabled=${!!already} class="btn-p" style="padding:6px 12px;font-size:12px;opacity:${already?0.4:1}">${already?'✓':'+'}</button>
            </div>
          `;})}
        </div>
      <//>
    </div>
  `;
};

// ══════════════════════════════════════════════════════════════════════════
// PAGE: TASKS
// ══════════════════════════════════════════════════════════════════════════
const PageTasks = () => {
  const today = todayKey();
  const [tasks,setTasks] = useState(()=>load('tasks',[]));
  const [filter,setFilter] = useState('hoy');
  const [showAdd,setShowAdd] = useState(false);
  const [form,setForm] = useState({title:'',category:'Personal',priority:'media',due:today,note:''});
  const sync = t => { setTasks(t); save('tasks',t); };
  const toggle = id => sync(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const remove = id => sync(tasks.filter(t=>t.id!==id));
  const add = () => { if(!form.title.trim())return; sync([...tasks,{...form,id:uid(),done:false}]); setForm({title:'',category:'Personal',priority:'media',due:today,note:''}); setShowAdd(false); };
  const PRIO = {alta:{c:'#B5614A',l:'Alta'},media:{c:'#CC7700',l:'Media'},baja:{c:'#6B9C7A',l:'Baja'}};
  const list = tasks.filter(t=>{
    if(filter==='hoy') return t.due===today&&!t.done;
    if(filter==='pendientes') return !t.done;
    if(filter==='completadas') return t.done;
    return true;
  }).sort((a,b)=>({alta:0,media:1,baja:2}[a.priority]-{alta:0,media:1,baja:2}[b.priority]));

  return html`
    <div class="page fade-up">
      <div class="page-header">
        <div class="col"><h2 style="font-size:20px;font-weight:700;color:#e5e2e1">Tareas</h2><p style="font-size:12px;color:rgba(196,176,154,0.6)">${tasks.filter(t=>!t.done).length} pendientes</p></div>
        <button class="btn-p" onClick=${()=>setShowAdd(true)}><${Ic} n="plus" s=${15} c="#fff"/>Nueva</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        ${['hoy','pendientes','completadas','todas'].map(f=>html`<button class=${'tab-pill'+(filter===f?' active':'')} onClick=${()=>setFilter(f)} style="text-transform:capitalize">${f}</button>`)}
      </div>
      ${list.length===0&&html`<div class="card empty-state"><div class="emo">✓</div><p style="color:rgba(196,176,154,0.45);font-size:13px">Sin tareas aquí</p></div>`}
      <div style="display:flex;flex-direction:column;gap:10px">
        ${list.map(t=>html`
          <div class="card" style=${{display:'flex',gap:12,alignItems:'flex-start',opacity:t.done?.65:1}}>
            <div class=${'check-box'+(t.done?' done':'')} style="margin-top:2px" onClick=${()=>toggle(t.id)}>
              ${t.done&&html`<${Ic} n="check" s=${13} c="#fff"/>`}
            </div>
            <div style="flex:1;min-width:0">
              <p style=${{fontSize:'13px',fontWeight:500,color:t.done?'rgba(196,176,154,0.35)':'#E8F5E8',textDecoration:t.done?'line-through':'none'}}>${t.title}</p>
              ${t.note&&html`<p style="font-size:11px;color:rgba(196,176,154,0.45);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note}</p>`}
              <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center">
                <span class="badge" style=${{background:CAT_COLORS[t.category]+'20',color:CAT_COLORS[t.category]}}>${t.category}</span>
                <span style=${{fontSize:'11px',color:PRIO[t.priority].c,fontWeight:500}}>● ${PRIO[t.priority].l}</span>
                ${t.due&&html`<span style="font-size:11px;color:rgba(196,176,154,0.45)">📅 ${fmtDate(t.due)}</span>`}
              </div>
            </div>
            <button onClick=${()=>remove(t.id)} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.3);padding:4px;margin-top:2px"><${Ic} n="trash" s=${14}/></button>
          </div>
        `)}
      </div>
      <${Modal} open=${showAdd} onClose=${()=>setShowAdd(false)} title="Nueva tarea">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input value=${form.title} onInput=${e=>setForm({...form,title:e.target.value})} placeholder="¿Qué hay que hacer?" autoFocus onKeyDown=${e=>e.key==='Enter'&&add()}/>
          <div class="grid2">

// PAGE: FOOD
// ══════════════════════════════════════════════════════════════════════════
const PageFood = () => {
  const today = todayKey();
  const [meals,setMeals] = useState(()=>load('meals',{}));
  const [prefs,setPrefs] = useState(()=>load('food-prefs',{goal:'equilibrada',cals:2000,restrictions:''}));
  const [showAdd,setShowAdd] = useState(false);
  const [showPrefs,setShowPrefs] = useState(false);
  const [aiLoad,setAiLoad] = useState(false);
  const [aiErr,setAiErr] = useState('');
  const [form,setForm] = useState({name:'',type:'desayuno',cals:'',note:''});
  const apiKey = load('ritual-api-key','');
  const todayM = meals[today]||[];
  const syncM = m => { setMeals(m); save('meals',m); };
  const add = () => { if(!form.name.trim())return; const m={...meals};m[today]=[...(m[today]||[]),{...form,id:uid(),cals:Number(form.cals)||0}];syncM(m);setForm({name:'',type:'desayuno',cals:'',note:''});setShowAdd(false); };
  const del = id => { const m={...meals};m[today]=(m[today]||[]).filter(x=>x.id!==id);syncM(m); };
  const totalCals = todayM.reduce((s,m)=>s+m.cals,0);
  const TYPES = ['desayuno','almuerzo','cena','snack'];
  const TIPO_ICO = {desayuno:'🌅',almuerzo:'☀️',cena:'🌙',snack:'🍎'};
  const TIPO_COL = {desayuno:'#CC7700',almuerzo:'#9B7440',cena:'#8B6535',snack:'#6B9C7A'};

  const genAI = async () => {
    setAiLoad(true); setAiErr('');
    try {
      const txt = await askAI(`Genera un plan de comidas para hoy en español.
Objetivo: ${prefs.goal}. Calorías: ${prefs.cals} kcal. Restricciones: ${prefs.restrictions||'ninguna'}.
Responde SOLO con JSON válido sin texto adicional:
{"desayuno":{"nombre":"...","calorias":000,"descripcion":"..."},"almuerzo":{"nombre":"...","calorias":000,"descripcion":"..."},"cena":{"nombre":"...","calorias":000,"descripcion":"..."},"snack":{"nombre":"...","calorias":000,"descripcion":"..."}}`, apiKey);
      const m2 = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);
      const upd={...meals};
      upd[today]=[...(upd[today]||[]),...Object.entries(m2).map(([t,v])=>({id:uid(),name:v.nombre,type:t,cals:v.calorias,note:v.descripcion}))];
      syncM(upd);
    } catch(e){ setAiErr(e.message); }
    setAiLoad(false);
  };

  return html`
    <div class="page fade-up">
      <div class="page-header">
        <div class="col"><h2 style="font-size:20px;font-weight:700;color:#e5e2e1">Comidas</h2><p style="font-size:12px;color:rgba(196,176,154,0.6)">${totalCals} / ${prefs.cals} kcal hoy</p></div>
        <div style="display:flex;gap:8px">
          <button class="btn-g" style="padding:10px 12px" onClick=${()=>setShowPrefs(true)}><${Ic} n="settings" s=${15} c="rgba(210,240,210,0.85)"/></button>
          <button class="btn-p" onClick=${()=>setShowAdd(true)}><${Ic} n="plus" s=${15} c="#fff"/>Añadir</button>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:rgba(196,176,154,0.6)">Calorías</span><span style="font-size:13px;font-weight:600;color:#e5e2e1">${totalCals} kcal</span></div>
        <div class="prog-track"><div style=${{height:'100%',borderRadius:3,width:`${Math.min(100,Math.round(totalCals/prefs.cals*100))}%`,background:'linear-gradient(90deg,#9B744099,#9B7440)',transition:'width .5s'}}/></div>
        <div style="display:flex;justify-content:space-between;margin-top:6px"><span style="font-size:11px;color:rgba(196,176,154,0.4)">0</span><span style="font-size:11px;color:rgba(196,176,154,0.4)">${prefs.cals} kcal objetivo</span></div>
      </div>

      ${!apiKey?html`
        <div class="info-box" style="margin-bottom:20px">
          <${Ic} n="info" s=${16} c="#CC7700"/>
          <div><p style="font-size:13px;font-weight:500;color:#ffd49a;margin-bottom:4px">IA no configurada</p><p style="font-size:12px;color:rgba(196,176,154,0.6)">Agrega tu API key de Anthropic en Ajustes para generar planes.</p></div>
        </div>
      `:html`
        <button class="btn-p" onClick=${genAI} disabled=${aiLoad} style="width:100%;justify-content:center;margin-bottom:20px;padding:12px">
          ${aiLoad?html`<span class="spin">◌</span> Generando...`:html`<${Ic} n="spark" s=${16} c="#fff"/> Generar plan con IA`}
        </button>
      `}
      ${aiErr&&html`<div style="margin-bottom:12px;padding:10px 14px;border-radius:10px;background:rgba(181,97,74,0.1);border:1px solid rgba(181,97,74,0.25);font-size:12px;color:#FF9F9A">${aiErr}</div>`}

      ${TYPES.map(type=>html`
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="font-size:18px">${TIPO_ICO[type]}</span>
            <span style="font-size:13px;font-weight:600;color:#e5e2e1;text-transform:capitalize">${type}</span>
            <span style="font-size:11px;color:rgba(196,176,154,0.45);margin-left:auto">${todayM.filter(m=>m.type===type).reduce((s,m)=>s+m.cals,0)} kcal</span>
          </div>
          ${todayM.filter(m=>m.type===type).length===0&&html`<p style="font-size:12px;color:rgba(196,176,154,0.35);padding-left:26px">Sin registros</p>`}
          ${todayM.filter(m=>m.type===type).map(m=>html`
            <div class="card" style=${{marginBottom:8,display:'flex',gap:12,alignItems:'flex-start',borderLeft:`3px solid ${TIPO_COL[type]}`}}>
              <div style="flex:1"><p style="font-size:13px;font-weight:500;color:#e5e2e1">${m.name}</p>${m.note&&html`<p style="font-size:11px;color:rgba(196,176,154,0.5);margin-top:3px">${m.note}</p>`}</div>
              <div style="text-align:right;flex-shrink:0">${m.cals>0&&html`<p style=${{fontSize:'12px',fontWeight:600,color:TIPO_COL[type]}}>${m.cals} kcal</p>`}<button onClick=${()=>del(m.id)} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.3);margin-top:4px"><${Ic} n="trash" s=${13}/></button></div>
            </div>
          `)}
        </div>
      `)}

      <${Modal} open=${showAdd} onClose=${()=>setShowAdd(false)} title="Añadir comida">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input value=${form.name} onInput=${e=>setForm({...form,name:e.target.value})} placeholder="Nombre del alimento" autoFocus/>
          <div class="grid2">
            <div><label class="lbl">Tipo</label><select value=${form.type} onChange=${e=>setForm({...form,type:e.target.value})}>${TYPES.map(t=>html`<option>${t}</option>`)}</select></div>
            <div><label class="lbl">Calorías</label><input type="number" value=${form.cals} onInput=${e=>setForm({...form,cals:e.target.value})} placeholder="kcal"/></div>
          </div>
          <input value=${form.note} onInput=${e=>setForm({...form,note:e.target.value})} placeholder="Descripción (opcional)"/>
          <button class="btn-p" style="width:100%;justify-content:center" onClick=${add}>Guardar</button>
        </div>
      <//>
      <${Modal} open=${showPrefs} onClose=${()=>{save('food-prefs',prefs);setShowPrefs(false);}} title="Preferencias de comida">
        <div style="display:flex;flex-direction:column;gap:12px">
          <div><label class="lbl">Objetivo</label><select value=${prefs.goal} onChange=${e=>setPrefs({...prefs,goal:e.target.value})}>${['equilibrada','pérdida de peso','ganancia muscular','vegana','vegetariana','keto','sin gluten'].map(g=>html`<option>${g}</option>`)}</select></div>
          <div><label class="lbl">Calorías diarias</label><input type="number" value=${prefs.cals} onInput=${e=>setPrefs({...prefs,cals:Number(e.target.value)})}/></div>
          <div><label class="lbl">Restricciones / alergias</label><input value=${prefs.restrictions} onInput=${e=>setPrefs({...prefs,restrictions:e.target.value})} placeholder="Ej: sin lactosa..."/></div>
          <button class="btn-p" style="width:100%;justify-content:center" onClick=${()=>{save('food-prefs',prefs);setShowPrefs(false);}}>Guardar</button>
        </div>
      <//>
    </div>
  `;
};

    {name:'Full Body Novato',desc:'Sentadilla goblet 3×12 · Press mancuernas 3×12 · Remo inclinado 3×12 · RDL 3×10',dur:'45 min',lvl:'Principiante'},
  ],
};
const PageGym = () => {
  const today = todayKey();
  const [plans,setPlans]   = useState(()=>load('gym-plans',[]));
  const [logs,setLogs]     = useState(()=>load('workout-logs',[]));
  const [showPlan,setShowPlan] = useState(false);
  const [showLog,setShowLog]   = useState(false);
  const [showPresets,setShowPresets] = useState(false);
  const [selPlan,setSelPlan] = useState(null);
  const [pf,setPf] = useState({name:'',days:[],exercises:'',category:'Pesas'});
  const [view,setView] = useState('hoy');
  const [presetCat,setPresetCat] = useState('Running');
  const DAYS=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const todayDay=()=>{const d=new Date().getDay();return DAYS[d===0?6:d-1];};
  const syncP=p=>{setPlans(p);save('gym-plans',p);};
  const syncL=l=>{setLogs(l);save('workout-logs',l);};
  const addPlan=()=>{if(!pf.name.trim())return;syncP([...plans,{...pf,id:uid()}]);setPf({name:'',days:[],exercises:'',category:'Pesas'});setShowPlan(false);};
  const addPreset=r=>{syncP([...plans,{id:uid(),name:r.name,days:[todayDay()],exercises:r.desc,category:presetCat}]);};
  const logW=(plan,done)=>{syncL([...logs.filter(l=>l.date!==today),{date:today,planId:plan.id,name:plan.name,done,id:uid()}]);setShowLog(false);};
  const toggleDay=d=>setPf({...pf,days:pf.days.includes(d)?pf.days.filter(x=>x!==d):[...pf.days,d]});
  const todayPlans=plans.filter(p=>(p.days||[]).includes(todayDay()));
  const todayLog=logs.find(l=>l.date===today);
  const CAT_ICON={Running:'🏃',Calistenia:'💪',Pesas:'🏋️'};
  const LVL_CLR={Principiante:'rgba(255,149,0,0.15)',Intermedio:'rgba(255,152,0,0.2)',Avanzado:'rgba(255,69,58,0.2)',Todos:'rgba(100,150,255,0.2)'};
  const LVL_TXT={Principiante:'#FF9500',Intermedio:'#FFB74D',Avanzado:'#FF8A80',Todos:'#90CAF9'};
  const week=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-d.getDay()+1+i);const k=d.toISOString().split('T')[0];const ld=logs.find(l=>l.date===k);return{k,day:DAYS[i],done:ld?.done,isToday:k===today};});
  return html`
    <div class="page fade-up">
      <div class="page-header">
        <div class="col"><h2 style="font-size:20px;font-weight:700;color:#e5e2e1">Gym</h2><p style="font-size:12px;color:rgba(196,176,154,0.6)">${logs.filter(l=>l.done).length} entrenos totales</p></div>
        <div style="display:flex;gap:8px">
          <button class="btn-g" style="padding:10px 12px" onClick=${()=>setShowPresets(true)}><${Ic} n="spark" s=${15} c="rgba(196,176,154,0.7)"/></button>
          <button class="btn-p" onClick=${()=>setShowPlan(true)}><${Ic} n="plus" s=${15} c="#fff"/>Rutina</button>
        </div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <p style="font-size:12px;font-weight:500;color:rgba(196,176,154,0.6);margin-bottom:12px">Esta semana</p>
        <div style="display:flex;gap:6px">
          ${week.map(d=>html`
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
              <span style=${{fontSize:10,color:d.isToday?'#ffb84d':'rgba(196,176,154,0.4)',fontWeight:d.isToday?600:400}}>${d.day}</span>
              <div style=${{width:32,height:32,borderRadius:8,background:d.done===true?'rgba(255,149,0,0.7)':d.done===false?'rgba(255,69,58,0.3)':'rgba(255,255,255,0.07)',border:`1.5px solid ${d.isToday?'#FF9500':'rgba(255,255,255,0.1)'}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:d.done===true?'#fff':d.done===false?'#FF8A80':''}}>
                ${d.done===true?'✓':d.done===false?'×':''}
              </div>
            </div>
          `)}
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        ${['hoy','planes'].map(v=>html`<button class=${'tab-pill'+(view===v?' active':'')} onClick=${()=>setView(v)} style="text-transform:capitalize">${v}</button>`)}
      </div>
      ${view==='hoy'&&html`<div>
        ${todayLog&&html`<div class="card" style=${{marginBottom:12,borderLeft:`3px solid ${todayLog.done?'#FF9500':'#FF8A80'}`}}><div style="display:flex;align-items:center;gap:10px"><span style="font-size:20px">${todayLog.done?'💪':'😴'}</span><div><p style="font-size:13px;font-weight:500;color:#e5e2e1">${todayLog.name}</p><p style=${{fontSize:11,color:todayLog.done?'#FF9500':'#FF8A80'}}>${todayLog.done?'Completado':'Saltado'}</p></div></div></div>`}
        ${todayPlans.length===0&&!todayLog&&html`<div class="card empty-state"><div class="emo">🏖</div><p style="font-size:13px;color:rgba(196,176,154,0.4)">Día de descanso</p><button class="btn-g" style="margin-top:12px" onClick=${()=>setShowPresets(true)}>Ver rutinas ✨</button></div>`}
        ${todayPlans.map(p=>html`
          <div class="card glass-hover" style="margin-bottom:10px;cursor:pointer" onClick=${()=>{setSelPlan(p);setShowLog(true);}}>
            <div style="display:flex;align-items:flex-start;justify-content:space-between">
              <div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span>${CAT_ICON[p.category]||'🏋️'}</span><p style="font-size:14px;font-weight:600;color:#e5e2e1">${p.name}</p></div><p style="font-size:11px;color:rgba(196,176,154,0.5);line-height:1.5">${p.exercises}</p></div>
              <span class="badge badge-g">Hoy</span>

          </div>

      ${view==='planes'&&html`<div>
        ${plans.length===0&&html`<div class="card empty-state"><div class="emo">📋</div><p style="color:rgba(196,176,154,0.4);font-size:13px">Sin rutinas aún</p><button class="btn-g" style="margin-top:12px" onClick=${()=>setShowPresets(true)}>Rutinas científicas ✨</button></div>`}
        ${plans.map(p=>html`
          <div class="card" style="margin-bottom:10px">
            <div style="display:flex;align-items:flex-start;justify-content:space-between">
              <div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span>${CAT_ICON[p.category]||'🏋️'}</span><p style="font-size:13px;font-weight:600;color:#e5e2e1">${p.name}</p></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px">${(p.days||[]).map(d=>html`<span class="badge badge-g" style="font-size:10px">${d}</span>`)}</div>${p.exercises&&html`<p style="font-size:11px;color:rgba(196,176,154,0.45);line-height:1.5">${p.exercises}</p>`}</div>
              <button onClick=${()=>syncP(plans.filter(x=>x.id!==p.id))} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.25);padding:4px;flex-shrink:0"><${Ic} n="trash" s=${14}/></button>
            </div>
          </div>
        `)}
      </div>`}
      <${Modal} open=${showLog&&!!selPlan} onClose=${()=>setShowLog(false)} title=${`Registrar: ${selPlan?.name||''}`}>
        <p style="font-size:12px;color:rgba(196,176,154,0.5);margin-bottom:16px;line-height:1.6">${selPlan?.exercises}</p>
        <div class="grid2"><button class="btn-p" style="justify-content:center;padding:14px" onClick=${()=>logW(selPlan,true)}>💪 Completado</button><button class="btn-d" style="padding:14px;width:100%" onClick=${()=>logW(selPlan,false)}>😴 Saltar</button></div>
      <//>
      <${Modal} open=${showPresets} onClose=${()=>setShowPresets(false)} title="Rutinas científicas">
        <div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none">
          ${Object.keys(GYM_PRESETS).map(cat=>html`<button class=${'tab-pill'+(presetCat===cat?' active':'')} onClick=${()=>setPresetCat(cat)} style="white-space:nowrap;flex-shrink:0">${CAT_ICON[cat]} ${cat}</button>`)}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${(GYM_PRESETS[presetCat]||[]).map(r=>html`
            <div class="card" style="padding:14px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
                <p style="font-size:13px;font-weight:600;color:#e5e2e1">${r.name}</p>
                <div style="display:flex;gap:5px;flex-shrink:0;margin-left:8px">
                  <span class="badge badge-s" style="font-size:10px">${r.dur}</span>
                  <span class="badge" style=${{background:LVL_CLR[r.lvl]||'rgba(255,255,255,0.08)',color:LVL_TXT[r.lvl]||'#E8F5E8',fontSize:10}}>${r.lvl}</span>
                </div>
              </div>
              <p style="font-size:11px;color:rgba(196,176,154,0.5);line-height:1.6;margin-bottom:10px">${r.desc}</p>
              <button class="btn-p" style="width:100%;justify-content:center;padding:8px;font-size:12px" onClick=${()=>{addPreset(r);setShowPresets(false);}}>+ Agregar a mis rutinas</button>
            </div>
          `)}
        </div>
      <//>
      <${Modal} open=${showPlan} onClose=${()=>setShowPlan(false)} title="Nueva rutina propia">
        <div style="display:flex;flex-direction:column;gap:12px">
          <input value=${pf.name} onInput=${e=>setPf({...pf,name:e.target.value})} placeholder="Nombre (ej: Push Day)" autoFocus/>

// PAGE: FINANCE  (balance hero + grouped by day)
// ══════════════════════════════════════════════════════════════════════════
const PageFinance = () => {
  const today = todayKey();
  const mo = today.slice(0,7);
  const [txns,setTxns] = useState(()=>load('txns',[]));
  const [view,setView] = useState('mes');
  const [showAdd,setShowAdd] = useState(false);
  const [form,setForm] = useState({type:'expense',amount:'',category:'Comida',note:'',date:today});
  const FCATS = {income:['Salario','Freelance','Negocio','Inversión','Otro'],expense:['Comida','Transporte','Entretenimiento','Salud','Ropa','Educación','Hogar','Suscripciones','Otro']};
  const FCCOL = {'Salario':'#4CAF50','Freelance':'#8BC34A','Comida':'#FF7043','Transporte':'#42A5F5','Entretenimiento':'#AB47BC','Salud':'#26C6DA','Ropa':'#EC407A','Educación':'#7E57C2','Hogar':'#66BB6A','Suscripciones':'#FFA726','Inversión':'#FFD700','Negocio':'#CDDC39','Otro':'#78909C'};
  const sync = t => { setTxns(t); save('txns',t); };
  const add = () => { if(!form.amount)return; sync([{...form,id:uid(),amount:Number(form.amount)},...txns]); setForm({type:'expense',amount:'',category:'Comida',note:'',date:today}); setShowAdd(false); };
  const pfx = view==='mes'?mo:today.slice(0,4);
  const inP = txns.filter(t=>t.date.startsWith(pfx));
  const inc = inP.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp = inP.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal = inc-exp;
  const sorted=[...inP].sort((a,b)=>b.date.localeCompare(a.date));
  const byDay={};sorted.forEach(t=>{if(!byDay[t.date])byDay[t.date]=[];byDay[t.date].push(t);});
  const byCat={};inP.filter(t=>t.type==='expense').forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+t.amount;});
  const catList=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return html`
    <div class="page fade-up">
      <div class="page-header">
        <div class="col"><h2 style="font-size:20px;font-weight:700;color:#e5e2e1">Finanzas</h2><p style="font-size:12px;color:rgba(196,176,154,0.6)">${view==='mes'?'Este mes':'Este año'}</p></div>
        <button class="btn-p" onClick=${()=>setShowAdd(true)}><${Ic} n="plus" s=${15} c="#fff"/>Movimiento</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        ${['mes','año'].map(v=>html`<button class=${'tab-pill'+(view===v?' active':'')} onClick=${()=>setView(v)}>${v==='mes'?'Este mes':'Este año'}</button>`)}
      </div>
      <div class="card" style=${{marginBottom:14,textAlign:'center',padding:'24px 18px',background:bal>=0?'rgba(255,149,0,0.14)':'rgba(255,69,58,0.15)',borderColor:bal>=0?'rgba(255,149,0,0.3)':'rgba(255,69,58,0.3)'}}>
        <p style="font-size:11px;font-weight:500;color:rgba(196,176,154,0.6);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Balance ${view==='mes'?'del mes':'del año'}</p>
        <p style=${{fontSize:38,fontWeight:700,color:bal>=0?'#FF9500':'#FF8A80',letterSpacing:'-1px'}}>${fmtMoney(bal)}</p>
        <p style="font-size:12px;color:rgba(196,176,154,0.4);margin-top:6px">${bal>=0?'✓ En positivo':'⚠ En negativo'}</p>
      </div>
      <div class="grid2" style="margin-bottom:14px">
        ${[{l:'Ingresos',v:inc,c:'#FF9500',i:'up'},{l:'Gastos',v:exp,c:'#FF8A80',i:'down'}].map(s=>html`
          <div class="card" style="text-align:center;padding:14px 10px">
            <div style="display:flex;justify-content:center;margin-bottom:6px"><${Ic} n=${s.i} s=${14} c=${s.c}/></div>
            <p style="font-size:10px;color:rgba(196,176,154,0.5);margin-bottom:4px">${s.l}</p>
            <p style=${{fontSize:15,fontWeight:700,color:s.c}}>${fmtMoney(s.v)}</p>
          </div>
        `)}
      </div>
      ${catList.length>0&&html`
        <div class="card" style="margin-bottom:16px">
          <p style="font-size:12px;font-weight:500;color:rgba(196,176,154,0.6);margin-bottom:12px">Top gastos</p>
          ${catList.map(([cat,amt])=>html`
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
              <div style=${{width:8,height:8,borderRadius:'50%',background:FCCOL[cat]||'#78909C',flexShrink:0}}/>
              <span style="font-size:12px;color:rgba(196,176,154,0.7);flex:1">${cat}</span>
              <div class="prog-track" style="width:70px"><div style=${{height:'100%',borderRadius:3,background:FCCOL[cat]||'#78909C',width:`${Math.min(100,amt/exp*100)}%`}}/></div>
              <span style="font-size:12px;font-weight:600;color:#e5e2e1;min-width:68px;text-align:right">${fmtMoney(amt)}</span>
            </div>
          `)}
        </div>
      `}
      <p style="font-size:13px;font-weight:600;color:#e5e2e1;margin-bottom:10px">Movimientos</p>
      ${Object.keys(byDay).length===0&&html`<div class="card empty-state"><div class="emo">💸</div><p style="color:rgba(196,176,154,0.4);font-size:13px">Sin movimientos</p></div>`}
      ${Object.entries(byDay).map(([day,ts])=>{
        const dInc=ts.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
        const dExp=ts.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
        return html`
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px">
              <span style="font-size:12px;font-weight:600;color:rgba(196,176,154,0.6)">${day===today?'Hoy':fmtDate(day)}</span>
              <span style=${{fontSize:11,color:dInc-dExp>=0?'#FF9500':'#FF8A80',fontWeight:500}}>${dInc>0?'+'+fmtMoney(dInc)+' ':''}${dExp>0?'- '+fmtMoney(dExp):''}</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:7px">
              ${ts.map(t=>html`
                <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 14px">
                  <div style=${{width:34,height:34,borderRadius:10,background:(FCCOL[t.category]||'#78909C')+'22',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <${Ic} n=${t.type==='income'?'up':'down'} s=${15} c=${t.type==='income'?'#FF9500':'#FF8A80'}/>
                  </div>
                  <div style="flex:1;min-width:0">
                    <p style="font-size:13px;font-weight:500;color:#e5e2e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note||t.category}</p>
                    <p style="font-size:11px;color:rgba(196,176,154,0.4);margin-top:1px">${t.category}</p>
                  </div>
                  <div style="flex-shrink:0;text-align:right">
                    <p style=${{fontSize:14,fontWeight:700,color:t.type==='income'?'#FF9500':'#FF8A80'}}>${t.type==='income'?'+':'-'}${fmtMoney(t.amount)}</p>
                    <button onClick=${()=>sync(txns.filter(x=>x.id!==t.id))} style="background:none;border:none;cursor:pointer;color:rgba(196,176,154,0.2);margin-top:2px"><${Ic} n="trash" s=${12}/></button>
                  </div>
                </div>
              `)}
            </div>
          </div>
        `;
      })}
      <${Modal} open=${showAdd} onClose=${()=>setShowAdd(false)} title="Nuevo movimiento">
        <div style="display:flex;flex-direction:column;gap:12px">
          <div style="display:grid;grid-template-columns:1fr 1fr;border-radius:12px;overflow:hidden;border:0.5px solid rgba(255,255,255,0.15)">
            ${['income','expense'].map(tp=>html`<button onClick=${()=>setForm({...form,type:tp,category:tp==='income'?'Salario':'Comida'})} style=${{padding:10,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:form.type===tp?(tp==='income'?'rgba(255,149,0,0.65)':'rgba(255,69,58,0.5)'):'rgba(255,255,255,0.06)',color:form.type===tp?'#fff':'rgba(196,176,154,0.6)',fontFamily:'Inter,sans-serif'}}>${tp==='income'?'💰 Ingreso':'💸 Gasto'}</button>`)}
          </div>
          <input type="number" value=${form.amount} onInput=${e=>setForm({...form,amount:e.target.value})} placeholder="Monto" autoFocus/>
          <div><label class="lbl">Categoría</label><select value=${form.category} onChange=${e=>setForm({...form,category:e.target.value})}>${(FCATS[form.type]||[]).map(c=>html`<option>${c}</option>`)}</select></div>
          <input value=${form.note} onInput=${e=>setForm({...form,note:e.target.value})} placeholder="Descripción (opcional)"/>
          <div><label class="lbl">Fecha</label><input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})}/></div>
          <button class="btn-p" style="width:100%;justify-content:center" onClick=${add}>Guardar</button>
        </div>
      <//>
    </div>
  `;
};
